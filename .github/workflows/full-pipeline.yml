name: Full Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils curl
          npm install -g opencode-ai@latest

      - name: Parse local_tag.md
        id: parse
        run: |
          LINE=$(head -1 conf/local_tag.md | tr -d '\n\r')
          TAG=$(echo "$LINE" | sed 's/ sursa:.*//')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      # ── Step 1: Generate curriculum ──
      - name: Generate curriculum
        run: node scripts/generate_curriculum.mjs

      - name: Commit curriculum
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add filter/
          if git diff --cached --quiet; then
            echo "No curriculum changes to commit"
          else
            TAG="${{ steps.parse.outputs.tag }}"
            git commit -m "auto: actualizeaza curriculum $TAG"
            git push
          fi

      # ── Step 2: Generate student agent ──
      - name: Generate student agent
        run: node scripts/generate_student_agent.mjs

      - name: Commit agent
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add agents/student.md
          if git diff --cached --quiet; then
            echo "No agent changes to commit"
          else
            TAG="${{ steps.parse.outputs.tag }}"
            git commit -m "auto: genereaza student.md pentru $TAG"
            git push
          fi

      # ── Step 3: Fetch & match jobs ──
      - name: Fetch & match jobs
        run: node scripts/fetch_agent_jobs.mjs

      - name: Commit jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          if git diff --cached --quiet; then
            echo "No job changes to commit"
          else
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git commit -m "auto: actualizeaza jobs.json ($(date -u +%Y-%m-%d))"
            git push
          fi

      # ── Step 4: Deploy ──
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
