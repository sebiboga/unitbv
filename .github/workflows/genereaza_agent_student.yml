name: Genereaza Agent Student

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai@latest

      - name: Parse local_tag.md
        id: parse
        run: |
          LINE=$(head -1 conf/local_tag.md | tr -d '\n\r')
          TAG=$(echo "$LINE" | sed 's/ sursa:.*//')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Generate student agent with opencode
        run: node scripts/generate_student_agent.mjs

      - name: Commit si push agent
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add agents/student.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TAG="${{ steps.parse.outputs.tag }}"
            git commit -m "auto: genereaza student.md pentru $TAG"
            git push
          fi
